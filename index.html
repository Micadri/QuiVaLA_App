<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accueil Visiteur - Qui Va Là ?</title>
</head>
<body>

    <div id="app">
        <div id="screen-home">
            <h1>Bienvenue chez nous</h1>
            <p>Veuillez signaler votre présence.</p>
            <button id="btn-start-entry">Je signale mon entrée</button>
            </div>

        <div id="screen-form" style="display: none;">
            <h2>Enregistrement de votre visite</h2>
            
            <form id="entry-form">
                <div>
                    <label for="prenom">Prénom :</label>
                    <input type="text" id="prenom" name="visiteur-prenom" required>
                </div>
                <div>
                    <label for="nom">Nom :</label>
                    <input type="text" id="nom" name="visiteur-nom" required>
                </div>
                <div>
                    <label for="email">Email :</label>
                    <input type="email" id="email" name="visiteur-email" required>
                </div>
                
                <div>
                    <label for="visite-type">Motif de la visite :</label>
                    <select id="visite-type" name="visite-type" required>
                        <option value="">-- Choisissez --</option>
                        <option value="Visite">Visiter un membre du personnel</option>
                        <option value="Formation">Suivre une formation ce jour</option>
                    </select>
                </div>

                <div id="bloc-personnel" style="display: none;">
                    <label for="visite-personnel">Qui venez-vous voir ?</label>
                    <select id="visite-personnel" name="visite-personnel"></select>
                </div>

                <div id="bloc-formation" style="display: none;">
                    <label for="visite-formation">Quelle formation ?</label>
                    <select id="visite-formation" name="visite-formation"></select>
                </div>

                <br>
                <button type="submit">Valider mon entrée</button>
                <button type="button" id="btn-cancel">Annuler</button>
            </form>
            <p id="form-error" style="color: red; display: none;"></p>
        </div>

        <div id="screen-ticket" style="display: none;">
            <h2>Entrée validée !</h2>
            <p>Veuillez conserver ces informations :</p>
            
            <div id="ticket-content" style="border: 2px dashed #000; padding: 15px; margin: 20px 0;">
                </div>
            
            <button id="btn-finish">Terminer</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
